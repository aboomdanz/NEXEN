<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXEN - Dashboard do Fundador</title>
    <!-- LINK CORRIGIDO: Usando CDNJS (Estável e Gratuito) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" type="application/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #00ffcc; padding: 20px; text-align: center; }
        .card { background: #111; border: 2px solid #00ffcc; padding: 20px; border-radius: 15px; margin: 20px auto; max-width: 450px; box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); }
        input { background: #000; border: 1px solid #00ffcc; color: #fff; padding: 12px; margin: 10px; border-radius: 5px; width: 80%; }
        button { background: #00ffcc; color: #000; border: none; padding: 15px; cursor: pointer; font-weight: bold; border-radius: 5px; width: 85%; margin: 10px; transition: 0.3s; }
        button:hover { background: #00cca3; transform: translateY(-2px); }
        .status { color: #888; font-size: 0.85em; word-break: break-all; }
        #log { color: #ff3333; font-weight: bold; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>
    <h1>🛡️ NEXEN Control Center</h1>
    <div class="card">
        <h3>1. Conexão</h3>
        <button id="connectBtn" onclick="connect()">Conectar MetaMask</button>
        <p id="walletAddress" class="status">Status: Desconectado</p>
        <div id="log"></div>
    </div>
    <div class="card">
        <h3>2. Oráculo (Configurar Preços)</h3>
        <label>ATH:</label><br>
        <input type="number" id="athInput" value="100"><br>
        <label>Preço Atual:</label><br>
        <input type="number" id="currentInput" value="95">
        <button onclick="updatePrices()">Atualizar Rede (Shield)</button>
    </div>
    <div class="card">
        <h3>3. Dados da Rede</h3>
        <button onclick="getStats()">Consultar Blockchain</button>
        <p>Total Supply: <span id="supply" style="color: #fff;">---</span> NXN</p>
        <p>Preço Atual: <span id="networkPrice" style="color: #fff;">---</span></p>
    </div>
    <script>
        const contractAddress = "0x3E8777dA0E11a0ebF1862D9a32bf79708751bEc1";
        const abi = [
            "function updatePrices(uint256 _ath, uint256 _current) public",
            "function setExchange(address _exchange) public",
            "function totalSupply() public view returns (uint256)",
            "function currentPrice() public view returns (uint256)"
        ];
        let provider, signer, contract;
        async function connect() {
            if (typeof ethers === 'undefined') {
                document.getElementById("log").innerText = "Erro: Link da biblioteca bloqueado. Tente recarregar a página (Ctrl+F5).";
                return;
            }
            try {
                if (window.ethereum) {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();
                    const address = await signer.getAddress();
                    contract = new ethers.Contract(contractAddress, abi, signer);
                    document.getElementById("walletAddress").innerText = "Conectado: " + address;
                    document.getElementById("log").innerText = "";
                    document.getElementById("connectBtn").innerText = "Conectado ✅";
                } else {
                    document.getElementById("log").innerText = "MetaMask não detectada!";
                }
            } catch (error) {
                document.getElementById("log").innerText = "Erro: " + error.message;
            }
        }
        async function updatePrices() {
            try {
                const ath = document.getElementById("athInput").value;
                const current = document.getElementById("currentInput").value;
                document.getElementById("log").style.color = "#00ffcc";
                document.getElementById("log").innerText = "Processando transação...";
                const tx = await contract.updatePrices(ath, current);
                await tx.wait();
                document.getElementById("log").innerText = "Sucesso! Preços atualizados.";
            } catch (error) {
                document.getElementById("log").style.color = "#ff3333";
                document.getElementById("log").innerText = "Erro na transação ou você recusou na MetaMask.";
            }
        }
        async function getStats() {
            try {
                const supply = await contract.totalSupply();
                const price = await contract.currentPrice();
                document.getElementById("supply").innerText = ethers.utils.formatUnits(supply, 18);
                document.getElementById("networkPrice").innerText = price.toString();
            } catch (error) {
                document.getElementById("log").innerText = "Erro ao ler dados da Blockchain.";
            }
        }
    </script>
</body>
</html>
