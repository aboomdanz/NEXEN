<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXEN</title>
</head>
<body>
    <h1>NEXEN DApp</h1>
    <div id="walletAddress">Status: Desconectado</div>
    <button id="connectBtn">Conectar MetaMask</button>
    <button id="disconnectBtn" style="display: none;">Desconectar</button>
    <div id="log"></div>
    <script>
        let isConnected = false;
        let provider = null;
        let signer = null;
        let contract = null;

        function disconnect() {
            isConnected = false;
            provider = null;
            signer = null;
            contract = null;
            
            // ✨ Desconectar também na MetaMask
            if (window.ethereum && window.ethereum.request) {
                window.ethereum.request({
                    method: "wallet_revokePermissions",
                    params: [{ eth_accounts: {} }]
                }).catch(() => {
                    // Se não funcionar, é porque a MetaMask não suporta
                    console.log("wallet_revokePermissions não suportado nesta versão do MetaMask");
                });
            }
            
            document.getElementById("walletAddress").innerText = "Status: Desconectado";
            document.getElementById("log").innerText = "Desconectado com sucesso!";
            document.getElementById("connectBtn").innerText = "Conectar MetaMask";
            document.getElementById("connectBtn").disabled = false;
            document.getElementById("disconnectBtn").style.display = "none";
            
            setTimeout(() => {
                document.getElementById("log").innerText = "";
            }, 2000);
        }
    </script>
</body>
</html>
