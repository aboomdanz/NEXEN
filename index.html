<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXEN Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/web3/dist/web3.min.js"></script>
</head>
<body>
    <h1>NEXEN Dashboard</h1>
    <button id="connectButton">Connect MetaMask</button>
    <button id="disconnectButton" style="display:none;">Disconnect</button>
    <h2>Account: <span id="account"></span></h2>
    <script>
        let web3;
        let userAccount;

        window.addEventListener('load', async () => {
            // Check if MetaMask is installed
            if (typeof window.ethereum !== 'undefined') {
                web3 = new Web3(window.ethereum);
                document.getElementById('connectButton').addEventListener('click', connectMetaMask);
                document.getElementById('disconnectButton').addEventListener('click', disconnectMetaMask);
            } else {
                alert('Please install MetaMask!');
            }
        });

        async function connectMetaMask() {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userAccount = accounts[0];
            document.getElementById('account').innerText = userAccount;
            document.getElementById('connectButton').style.display = 'none';
            document.getElementById('disconnectButton').style.display = 'block';
        }

        async function disconnectMetaMask() {
            userAccount = null;
            document.getElementById('account').innerText = '';
            document.getElementById('connectButton').style.display = 'block';
            document.getElementById('disconnectButton').style.display = 'none';
        }
    </script>
</body>
</html>
